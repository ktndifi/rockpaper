<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>가위바위보 게임</title>

<style>
body {
  font-family: 'Segoe UI';
  text-align: center;
  background: #f4f6f8;
  transition: 0.3s;
}
.dark {
  background: #121212;
  color: white;
}

.top {
  position: fixed;
  top: 10px;
  right: 10px;
}

button {
  padding: 12px 18px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  background: #4CAF50;
  color: white;
  cursor: pointer;
}
button:hover {
  opacity: 0.8;
}

#result {
  font-size: 24px;
  margin: 20px;
}

.score {
  font-size: 20px;
}

#statsBox {
  display: none;
  margin-top: 20px;
}

table {
  margin: auto;
  border-collapse: collapse;
}
td, th {
  border: 1px solid #aaa;
  padding: 8px 12px;
}

canvas {
  margin-top: 20px;
  background: white;
}

/* 🎉 컨페티 */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  top: -10px;
  animation: fall linear forwards;
}
@keyframes fall {
  to {
    transform: translateY(100vh) rotate(720deg);
  }
}
</style>
</head>

<body>

<div class="top">
  <button onclick="toggleDark()">🌙</button>
  <button onclick="toggleStats()">📊</button>
</div>

<h1>✊ 가위 바위 보 ✌</h1>

<div>
  <button onclick="play('가위')">✌ 가위</button>
  <button onclick="play('바위')">✊ 바위</button>
  <button onclick="play('보')">🖐 보</button>
</div>

<div id="result">선택하세요!</div>

<div class="score">
  👤 나: <span id="userScore">0</span> |
  🤖 컴퓨터: <span id="cpuScore">0</span>
</div>

<!-- 📊 그래프 -->
<canvas id="chart" width="500" height="250"></canvas>

<!-- 📋 통계 -->
<div id="statsBox">
  <h3>📊 승률 통계</h3>
  <table>
    <tr><th>승</th><th>패</th><th>무</th><th>승률</th></tr>
    <tr>
      <td id="win">0</td>
      <td id="lose">0</td>
      <td id="draw">0</td>
      <td id="rate">0%</td>
    </tr>
  </table>
</div>

<script>
let userScore = 0;
let cpuScore = 0;

let win = 0, lose = 0, draw = 0;
let history = [];

const choices = ['가위','바위','보'];

function play(user){
  if(userScore === 3 || cpuScore === 3) return;

  const cpu = choices[Math.floor(Math.random()*3)];
  let resultText = "";

  if(user === cpu){
    resultText = "😐 무승부";
    draw++;
  } else if(
    (user==='가위' && cpu==='보') ||
    (user==='바위' && cpu==='가위') ||
    (user==='보' && cpu==='바위')
  ){
    resultText = "🎉 승리!";
    userScore++;
    win++;
  } else {
    resultText = "😢 패배!";
    cpuScore++;
    lose++;
  }

  document.getElementById("result").innerText =
    `나: ${user} vs 컴퓨터: ${cpu} → ${resultText}`;

  updateScore();
  updateStats();
  updateChart();

  // 🎯 3판 먼저 승리
  if(userScore === 3){
    endGame(true);
  } else if(cpuScore === 3){
    endGame(false);
  }
}

function updateScore(){
  document.getElementById("userScore").innerText = userScore;
  document.getElementById("cpuScore").innerText = cpuScore;
}

function updateStats(){
  document.getElementById("win").innerText = win;
  document.getElementById("lose").innerText = lose;
  document.getElementById("draw").innerText = draw;

  let total = win + lose;
  let rate = total ? ((win / total) * 100).toFixed(1) : 0;
  document.getElementById("rate").innerText = rate + "%";
}

function toggleDark(){
  document.body.classList.toggle("dark");
}

function toggleStats(){
  const box = document.getElementById("statsBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 🎉 게임 종료
function endGame(winFlag){
  if(winFlag){
    document.getElementById("result").innerText = "🏆 축하합니다! 최종 승리!";
    confettiEffect();
  } else {
    document.getElementById("result").innerText = "💪 아쉽네요! 다시 도전!";
  }

  setTimeout(resetGame, 2500);
}

// 🎉 컨페티 효과
function confettiEffect(){
  for(let i=0;i<80;i++){
    const div = document.createElement("div");
    div.className = "confetti";
    div.style.left = Math.random()*100 + "vw";
    div.style.background = `hsl(${Math.random()*360},100%,50%)`;
    div.style.animationDuration = (Math.random()*2+2)+"s";
    document.body.appendChild(div);

    setTimeout(()=>div.remove(), 3000);
  }
}

// 🔄 리셋
function resetGame(){
  userScore = 0;
  cpuScore = 0;
  updateScore();
}

// 📈 그래프
const ctx = document.getElementById("chart").getContext("2d");

function updateChart(){
  let total = win + lose;
  let rate = total ? win / total : 0;
  history.push(rate);

  ctx.clearRect(0,0,500,250);
  ctx.beginPath();

  history.forEach((v,i)=>{
    let x = (i/(history.length-1 || 1)) * 500;
    let y = 250 - (v * 250);

    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.lineWidth = 3;
  ctx.strokeStyle = "#4CAF50";
  ctx.stroke();
}
</script>

</body>
</html>
